<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>404 — Stránka sa nenašla · RustCust</title>
    <meta name="robots" content="noindex"/>
    <meta name="theme-color" content="#0e0f13" id="themeColorMeta"/>

    <!--
      No <base> tag: all asset paths below are relative, so they resolve
      correctly whether the site is deployed at the domain root
      (https://example.com/404.html) or as a GitHub Pages project site
      (https://username.github.io/repo/404.html). GitHub Pages serves this
      page from the site root in both cases, so nothing needs editing per deploy.
    -->

    <link rel="icon" href="assets/favicon.ico" sizes="any"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Oswald:wght@500;600;700&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="404.css"/>
</head>
<body data-theme="dark">
<main class="error">
    <div class="error__skull" aria-hidden="true">
        <img src="animation/skull/assets/skull-dizzy.png" alt=""/>
    </div>
    <p class="error__code">404</p>
    <h1 class="error__title">Táto stránka odišla na výlet.</h1>
    <p class="error__lead">Odkaz je nefunkčný, stránka sa presunula alebo nikdy neexistovala. Tak či onak — poďme ťa dostať späť do dielne.</p>
    <a class="error__home" href=".">← Späť na úvod</a>
</main>

<script>
    // Match the saved theme so the 404 page feels continuous with the site.
    // Dark is the default; a previously saved choice wins. System setting is ignored.
    (function () {
        var t = "dark";

        try {
            t = localStorage.getItem("theme-preference") || "dark";
        } catch (e) {
            // localStorage can fail in locked-down browsers.
        }

        document.body.dataset.theme = t;

        var meta = document.getElementById("themeColorMeta");
        if (meta) {
            // Read the canonical page background straight from the CSS tokens.
            var bg = getComputedStyle(document.body).getPropertyValue("--bg-base").trim();
            if (bg) meta.setAttribute("content", bg);
        }
    })();
</script>
</body>
</html>
