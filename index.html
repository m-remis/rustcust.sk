    <meta name="author" content="Rastislav Buchta"/>
    <meta name="theme-color" content="#0e0f13"/>

    <!-- Open Graph / social -->
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="RustCust — cyklodielňa v Rajci"/>
    <meta property="og:description" content="Servis bicyklov a lyží, custom úpravy a guiding v Rajeckej doline."/>
    <meta property="og:url" content="https://www.rustcust.sk/"/>
    <meta name="twitter:card" content="summary"/>

    <link rel="canonical" href="https://www.rustcust.sk/"/>
    <link rel="icon" href="assets/favicon.ico" sizes="any"/>
    <link rel="manifest" href="site.webmanifest"/>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="animation/skull/skull.css"/>

    <!-- Anti-flash safety net: html.site-booting hides the shell until the
         engine swaps it to site-ready. If JS is off or fails to load, that
         swap never happens — so force the page visible for no-JS users. -->
    <noscript>
        <style>html.site-booting body { opacity: 1 !important; }</style>
    </noscript>

    <!-- GoatCounter analytics (privacy-friendly, no cookies). Loads async and
         independently of engine.js so tracking works even if the app fails.
         The visible visitor count in the footer is rendered separately by the
         engine from meta.analytics in site-spec.json. -->
    <script data-goatcounter="https://rustcust.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</head>
<body data-theme="dark">
<!-- Keyboard/screen-reader skip link: jumps past the header to the main
     content. Visually hidden until focused (see .skip-link in styles.css);
     targets #main, which is tabindex="-1" so it can receive focus. -->
<a class="skip-link" href="#main">Preskočiť na obsah</a>
<!-- Background layer (image + overlay), painted by JS -->
<div class="bg" id="bg" aria-hidden="true"></div>
<div class="bg" id="bg2" aria-hidden="true"></div>
<div class="bg-overlay" aria-hidden="true"></div>

<header class="site-header">
    <span class="header-skull" id="headerSkull" role="button" tabindex="0" aria-label="Mascot">
        <img src="animation/skull/assets/icon_base.png" alt=""/>
    </span>

    <a class="brand" href="#home" id="brand" aria-label="Home"></a>

    <nav class="nav-desktop" id="navDesktop" aria-label="Primary"></nav>

    <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme"
                aria-pressed="false">
            <svg class="theme-toggle__icon" aria-hidden="true" viewBox="0 0 24 24" width="20" height="20">
                <!-- One shape morphs between a crescent moon (dark) and a rayed sun (light).
                     The bite is a mask circle that slides away in light mode; the rays
                     fade in. All transitions are CSS, driven by [data-theme] on <body>. -->
                <mask id="themeToggleMoonCut">
                    <rect x="0" y="0" width="24" height="24" fill="#fff"/>
                    <circle class="theme-toggle__cut" cx="18" cy="9" r="9" fill="#000"/>
                </mask>
                <circle class="theme-toggle__core" cx="12" cy="12" r="6"
                        fill="currentColor" mask="url(#themeToggleMoonCut)"/>
                <g class="theme-toggle__rays" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="1" x2="12" y2="3.5"/>
                    <line x1="12" y1="20.5" x2="12" y2="23"/>
                    <line x1="1" y1="12" x2="3.5" y2="12"/>
                    <line x1="20.5" y1="12" x2="23" y2="12"/>
                    <line x1="4.2" y1="4.2" x2="5.9" y2="5.9"/>
                    <line x1="18.1" y1="18.1" x2="19.8" y2="19.8"/>
                    <line x1="4.2" y1="19.8" x2="5.9" y2="18.1"/>
                    <line x1="18.1" y1="5.9" x2="19.8" y2="4.2"/>
                </g>
            </svg>
        </button>

        <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu" aria-expanded="false"
                aria-controls="navMobile">
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
        </button>
    </div>
</header>

<!-- Mobile navigation (separate behavior from desktop) -->
<nav class="nav-mobile" id="navMobile" aria-label="Mobile" aria-hidden="true"></nav>
<div class="nav-mobile__scrim" id="navScrim" hidden></div>

<main id="main" class="content" tabindex="-1"></main>

<footer class="site-footer" id="siteFooter"></footer>

<script type="module" src="engine.js"></script>
</body>
